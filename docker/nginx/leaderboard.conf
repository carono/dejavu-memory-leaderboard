# Example nginx virtual host for the Dejavu Leaderboard (Yii2 Basic).
# Adjust server_name, root, TLS certificate paths and the PHP-FPM upstream
# to match your environment, then reload nginx.

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name leaderboard.example.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name leaderboard.example.com;

    ssl_certificate     /etc/nginx/certs/example.crt;
    ssl_certificate_key /etc/nginx/certs/example.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Yii2 serves from the web/ directory
    root  /var/www/dejavu-leaderboard/web;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Point this at your PHP 8.x FPM upstream (host:port or unix socket)
        fastcgi_pass         127.0.0.1:9000;
        fastcgi_index        index.php;
        include              fastcgi_params;
        fastcgi_param        SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(ht|git) {
        deny all;
    }
}
